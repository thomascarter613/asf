name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify repository baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify repository
        run: bun run verify

      - name: Test work packet core
        run: bun test packages/work-packet-core

      - name: Test work packet CLI
        run: bun test packages/work-packet-cli

      - name: Run executable evaluation harness
        run: bash tools/eval/run-evaluations.sh

      - name: Check whitespace
        run: git diff --check
